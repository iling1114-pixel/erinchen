<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <title>我的健身工廠 — 會員APP | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="case-study.css">
  <style>
    .case-fullpage {
      padding: 120px 24px 80px;
      background: #f4f6f7;
      min-height: 100vh;
    }
    .case-fullpage-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .case-fullpage-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      color: #323232;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .case-fullpage-back:hover {
      opacity: 0.7;
    }
    .case-fullpage-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 36px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08);
    }
    .case-fullpage-figure {
      position: relative;
      width: 100%;
    }
  </style>
</head>

<body class="case-page">
  <!-- Shared header component (nav + mobile menu) -->
  <div id="site-header"></div>

  <!-- Full Page Design -->
  <main class="case-fullpage">
    <div class="case-fullpage-inner">
      <a href="index.html#works-grid" class="case-fullpage-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back
      </a>
      <div class="case-fullpage-figure">
        <img src="assets/portfolio-fitness.png" alt="我的健身工廠 會員APP" class="case-fullpage-img">
      </div>
    </div>
  </main>

  <!-- Works selector (other cases) -->
  <div id="works-selector"></div>

  <!-- Shared footer component (contact + go-top + captcha) -->
  <div id="site-footer"></div>

  <script src="components/header.js"></script>
  <script src="components/works-selector.js"></script>
  <script src="components/footer.js"></script>
  <script src="script.js"></script>
</body>

</html>
